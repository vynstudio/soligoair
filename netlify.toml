# ─── HTTP → HTTPS redirect ────────────────────────────────────────────────────
[[redirects]]
  from   = "http://soligoair.shop/*"
  to     = "https://soligoair.shop/:splat"
  status = 301
  force  = true

# ─── www → non-www ────────────────────────────────────────────────────────────
[[redirects]]
  from   = "https://www.soligoair.shop/*"
  to     = "https://soligoair.shop/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "/ads-manager"
  to     = "/ads-manager.html"
  status = 200

[[redirects]]
  from   = "/google-ads"
  to     = "/google-ads.html"
  status = 200

[[redirects]]
  from   = "/api/google-ads-sync"
  to     = "/.netlify/functions/google-ads-sync"
  status = 200

[[redirects]]
  from   = "/tuneup"
  to     = "/tune-up.html"
  status = 200

# ─── 404 fallback ─────────────────────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404

# ─── Global headers ───────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net https://www.googletagmanager.com https://www.google-analytics.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://tagassistant.google.com https://td.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.facebook.com https://www.googletagmanager.com https://www.google.com https://www.google-analytics.com https://googleads.g.doubleclick.net https://www.googleadservices.com; connect-src 'self' https://graph.facebook.com https://*.netlify.app https://soligoair.shop https://api.anthropic.com https://services.leadconnectorhq.com https://www.facebook.com https://connect.facebook.net https://www.google-analytics.com https://analytics.google.com https://googleads.g.doubleclick.net https://www.googletagmanager.com https://www.googleadservices.com https://tagassistant.google.com https://td.doubleclick.net https://region1.google-analytics.com; frame-src https://www.facebook.com https://td.doubleclick.net https://tagassistant.google.com;"
    Strict-Transport-Security  = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"

# ─── Cache static assets ──────────────────────────────────────────────────────
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── HTML caching ──────────────────────────────────────────────────────────────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, no-cache, must-revalidate"

# ─── CSS/JS caching ───────────────────────────────────────────────────────────
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Font caching ──────────────────────────────────────────────────────────────
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from   = "/api/meta-ads"
  to     = "/.netlify/functions/meta-ads"
  status = 200

[[headers]]
