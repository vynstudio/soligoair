[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[context.production]
  environment = { NODE_ENV = "production", NODE_VERSION = "18" }

[build.environment]
  NODE_VERSION = "18"

# ─── API rewrites to Netlify Functions ─────────────────────────────────────────
